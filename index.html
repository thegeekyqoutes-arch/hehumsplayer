        .cover-art {
            width: 100%; height: 100%; border-radius: 50%; object-fit: cover;
            border: 4px solid var(--surface-light);
            animation: rotate 20s linear infinite; animation-play-state: paused;
        }
        .cover-art.playing { animation-play-state: running; }
        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        .song-meta h2 { font-size: 1.4rem; margin-bottom: 4px; }
        .song-meta p { color: var(--text-dim); font-size: 0.9rem; }

        .scrubber-box { margin: 20px 0; }
        .progress-bar {
            width: 100%; height: 5px; -webkit-appearance: none;
            background: var(--surface-light); border-radius: 5px; cursor: pointer;
        }
        .progress-bar::-webkit-slider-thumb {
            -webkit-appearance: none; width: 12px; height: 12px; background: var(--primary); border-radius: 50%;
        }
        .time-labels { display: flex; justify-content: space-between; font-size: 0.75rem; color: var(--text-dim); margin-top: 8px; }

        .controls { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .ctrl-btn { background: none; border: none; color: var(--text-main); font-size: 1.2rem; cursor: pointer; position: relative; }
        .ctrl-btn.active { color: var(--primary); }
        
        /* Small "1" badge for Repeat One */
        .repeat-one-badge {
            position: absolute; top: -5px; right: -8px; font-size: 0.6rem;

            padding: 1px 4px; border-radius: 10px; display: none;
        }
        .ctrl-btn.repeat-one .repeat-one-badge { display: block; }

        .play-toggle {
            width: 55px; height: 55px; background: var(--primary); border-radius: 50%;
            display: flex; justify-content: center; align-items: center; font-size: 1.4rem;
        }

        .list-section { background: var(--surface-light); border-radius: 16px; height: 250px; overflow: hidden; display: flex; flex-direction: column; }
        .tabs { display: flex; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .tab { flex: 1; padding: 12px; text-align: center; font-size: 0.85rem; cursor: pointer; color: var(--text-dim); }
        .tab.active { color: var(--primary); background: var(--surface); }
        .scroll-area { flex: 1; overflow-y: auto; padding: 10px; }

        .song-card { display: flex; align-items: center; gap: 12px; padding: 8px; border-radius: 8px; margin-bottom: 6px; cursor: pointer; }

        .card-img { width: 40px; height: 40px; border-radius: 4px; object-fit: cover; }
        .card-info { flex: 1; }

        .action-btn { background: none; border: none; cursor: pointer; padding: 8px; font-size: 0.9rem; }
        .add-btn { color: var(--text-dim); }
        .add-btn:hover { color: var(--text-main); }
        .remove-btn { color: var(--primary); }

    // View state: 'library' or 'playlist'
    let currentView = 'library'; 
    // Playing context: Tells the player which list it's currently moving through
    let playingContext = 'library'; 
    
    let currentIndex = 0;
    let isPlaying = false;
    let isShuffle = false;
    let loopState = 0; 

    const audio = document.getElementById('audio-engine');
    const playBtn = document.getElementById('play-btn');
    const playIcon = document.getElementById('play-icon');
    const progBar = document.getElementById('progress');
    const loopBtn = document.getElementById('loop-btn');
    const shuffleBtn = document.getElementById('shuffle-btn');
    const coverArt = document.getElementById('main-cover');
    const tabLib = document.getElementById('tab-lib');
    const tabPlay = document.getElementById('tab-play');

    // Helper to get the array currently driving the music
    function getActiveList() {
        return playingContext === 'library' ? cloudLibrary : userPlaylist;
    }

    // --- TAB SWITCHING LOGIC ---
    tabLib.onclick = () => {
        currentView = 'library';
        tabLib.classList.add('active');
        tabPlay.classList.remove('active');
        renderList();
    };

    tabPlay.onclick = () => {
        currentView = 'playlist';
        tabPlay.classList.add('active');
        tabLib.classList.remove('active');
        renderList();
    };

    // --- TRACK LOADING & PLAYBACK ---
    function loadTrack(index) {
        const activeList = getActiveList();
        if(activeList.length === 0) return;
        
        // Prevent out of bounds if playlist changed size
        if (index >= activeList.length) index = 0;
        currentIndex = index;
        
        const track = activeList[currentIndex];
        if(!track) return;
        
        document.getElementById('main-title').innerText = track.title;
        document.getElementById('main-artist').innerText = track.artist;
        coverArt.src = track.cover;
        
        // Only load the audio source if it's different (prevents restart on re-renders)
        if(!audio.src.includes(track.src)) {
            audio.src = track.src;
        }
        renderList();
    }

    function togglePlay() {
        if(getActiveList().length === 0) return;
        
        if(audio.paused) {
            audio.play();
            isPlaying = true;
            playIcon.className = 'fas fa-pause';
            coverArt.classList.add('playing');
        } else {
            audio.pause();
            isPlaying = false;
            playIcon.className = 'fas fa-play';
            coverArt.classList.remove('playing');
        }
    }

    function nextTrack() {
        const activeList = getActiveList();
        if(activeList.length === 0) return;

        if(isShuffle) {
            currentIndex = Math.floor(Math.random() * activeList.length);
        } else {
            if (currentIndex === activeList.length - 1 && loopState === 0) {
                pauseTrack();
                return;
            }
            currentIndex = (currentIndex + 1) % activeList.length;
        }
        loadTrack(currentIndex);
        audio.play();
        isPlaying = true;
        playIcon.className = 'fas fa-pause';
        coverArt.classList.add('playing');
    }

    function pauseTrack() {
        audio.pause();
        isPlaying = false;
        playIcon.className = 'fas fa-play';
        coverArt.classList.remove('playing');
    }

    // --- SCRUBBER FIX ---
    progBar.addEventListener('input', (e) => {
        if (audio.duration) {
            const seekTime = (e.target.value / 100) * audio.duration;
            audio.currentTime = seekTime;
        }
    });

    // --- CONTROLS LISTENERS ---
    shuffleBtn.onclick = () => {
        isShuffle = !isShuffle;
        shuffleBtn.classList.toggle('active');
    };

    loopBtn.addEventListener('click', () => {
        loopState = (loopState + 1) % 3; 
        loopBtn.classList.remove('active', 'repeat-one');
        if (loopState === 1) loopBtn.classList.add('active'); 
        else if (loopState === 2) loopBtn.classList.add('active', 'repeat-one'); 
    });

    audio.onended = () => {
        if (loopState === 2) {
            audio.currentTime = 0;
            audio.play();
        } else {
            nextTrack();
        }
    };

    playBtn.onclick = togglePlay;
    document.getElementById('next-btn').onclick = nextTrack;
    document.getElementById('prev-btn').onclick = () => {
        const activeList = getActiveList();
        if(activeList.length === 0) return;
        currentIndex = (currentIndex - 1 + activeList.length) % activeList.length;
        loadTrack(currentIndex);
        audio.play();
        isPlaying = true;
        playIcon.className = 'fas fa-pause';
        coverArt.classList.add('playing');
    };

    audio.ontimeupdate = () => {
        if (!isNaN(audio.duration)) {
            const pos = (audio.currentTime / audio.duration) * 100;
            progBar.value = pos;
            document.getElementById('cur-time').innerText = formatTime(audio.currentTime);
            document.getElementById('dur-time').innerText = formatTime(audio.duration);
        }
    };

    function formatTime(t) {
        if(isNaN(t)) return "0:00";
        let m = Math.floor(t / 60);
        let s = Math.floor(t % 60).toString().padStart(2, '0');
        return `${m}:${s}`;
    }

    // --- RENDERING LISTS ---
    function renderList() {
        const container = document.getElementById('list-container');
        container.innerHTML = '';
        
        const listToRender = currentView === 'library' ? cloudLibrary : userPlaylist;

        if(listToRender.length === 0) {
            container.innerHTML = '<div class="empty-state">Your playlist is empty.<br>Go to Library to add songs!</div>';
            return;
        }

        listToRender.forEach((song, i) => {
            const div = document.createElement('div');
            // Check if this specific song is playing in this specific tab context
            const isPlayingHere = (playingContext === currentView && i === currentIndex);
            
            div.className = `song-card ${isPlayingHere ? 'now-playing' : ''}`;
            
            div.innerHTML = `
                <img src="${song.cover}" class="card-img">
                <div class="card-info">
                    <h4>${song.title}</h4>
                    <p>${song.artist}</p>
                </div>
            `;

            // Setup buttons based on which tab we are viewing
            if (currentView === 'library') {
                const addBtn = document.createElement('button');
                addBtn.className = 'action-btn add-btn';
                addBtn.innerHTML = '<i class="fas fa-plus"></i>';
                addBtn.onclick = (e) => {
                    e.stopPropagation(); // Prevents clicking the card background to play
                    userPlaylist.push(song);
                    // Flash the button to show it worked
                    addBtn.innerHTML = '<i class="fas fa-check" style="color:var(--primary)"></i>';
                    setTimeout(() => addBtn.innerHTML = '<i class="fas fa-plus"></i>', 1000);
                };
                div.appendChild(addBtn);
            } else {
                const removeBtn = document.createElement('button');
                removeBtn.className = 'action-btn remove-btn';
                removeBtn.innerHTML = '<i class="fas fa-trash"></i>';
                removeBtn.onclick = (e) => {
                    e.stopPropagation();
                    userPlaylist.splice(i, 1);
                    // If you delete the currently playing song in the playlist, stop it
                    if (playingContext === 'playlist' && currentIndex === i) {
                        pauseTrack();
                        currentIndex = 0; 
                    }
                    renderList(); 
                };
                div.appendChild(removeBtn);
            }

            // Click anywhere else on the card to play the song
            div.onclick = () => {
                playingContext = currentView;
                currentIndex = i; 
                loadTrack(i); 
                audio.play();
                isPlaying = true;
                playIcon.className = 'fas fa-pause';
                coverArt.classList.add('playing');
            };
            container.appendChild(div);
        });
    }

    // Initialize
    loadTrack(0);
</script>
</body>
</html>
